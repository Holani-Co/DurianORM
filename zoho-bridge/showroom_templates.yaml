# Customer-facing showroom templates, generated from the client sheet
# 'City wise Location template.xlsx'. DO NOT hand-edit — regenerate.
#
# Two consumers:
#   sync_showroom_templates.py -> pushes `content` into Chatwoot canned
#     responses under `short_code`, same pattern as social_templates.yaml.
#   main.py retail gate -> uses `showrooms[].location` to join each option
#     to its CRM owner_id in retail_showrooms.yaml (the generated directory).
#
# `short_code` is COMPOSED (intent + city + vertical), never chosen by the
# LLM — 55 near-identical templates would be a coin flip for a model. The
# AI only decides intent; retail_showrooms.lookup_city() picks the city.
#
# location: null  -> block could not be confidently joined to the directory,
#                    so it renders as text but carries no owner_id.
