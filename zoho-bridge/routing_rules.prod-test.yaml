# Partial-production routing override.
#
# Activation: bridge points at this file via DURIAN_ROUTING_OVERRIDE_PATH.
# Categories below keep ONLY their team_id, so their forward_to / cc /
# include_customer_in_cc come from base routing_rules.yaml (= the REAL
# handlers, including the doors location-routing and bulk sector/region
# routing). The two exceptions, complaint + legal_complaint, are still
# funnelled to the shared test inbox and get no customer acknowledgment.
#
# Customer acknowledgments are globally on via EMAIL_CUSTOMER_ACK_ENABLED=true;
# the acknowledgment_template_for block below disables them for the two
# test-funnelled categories only (must be a NON-template word like 'disabled'
# — null / ~ / off silently fall back to sending an ack).

categories:
  # In-channel (no forward) — team only
  product_enquiry:        { team_id: 6 }
  general_information:    { team_id: 7 }
  existing_order_enquiry: { team_id: 8 }

  # Still test-funnelled: complaint + legal_complaint
  complaint:
    team_id: 4
    forward_to: rachael.rodrigues@durian.in
    cc: [varsha@durian.in, sushil.k@durian.in, shilpa@durian.in]
    include_customer_in_cc: false
  legal_complaint:
    team_id: 2
    forward_to: rachael.rodrigues@durian.in
    cc: [varsha@durian.in, sushil.k@durian.in, shilpa@durian.in]
    include_customer_in_cc: false

  # LIVE — team_id only; base supplies the real forward_to + cc + customer-cc
  # (doors → location routing; project_bulk_order → sector + region routing).
  franchise_dealership:    { team_id: 9 }
  vendor_supplier_enquiry: { team_id: 10 }
  marketing_advertising:   { team_id: 3 }
  collaboration_request:   { team_id: 11 }
  career_job_enquiry:      { team_id: 1 }
  project_bulk_order:      { team_id: 12 }
  full_home_customization: { team_id: 13 }
  doors_veneer_plywood:    { team_id: 14 }

# Suppress acks for complaint/legal only.
acknowledgment_template_for:
  complaint:       disabled
  legal_complaint: disabled
