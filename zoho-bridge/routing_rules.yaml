      is a business needing furniture in volume, not a household
      customer.
    examples:
      - "Need to furnish 50 hotel rooms in Goa — bulk order quote please"
      - "Builder requirement for 200 apartments — modular kitchens"
      - "Office relocation project — need 80 ergonomic chairs"
      - "Tender enquiry for government department"
